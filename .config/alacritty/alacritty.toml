[window]
opacity = 0.95

[font]
size = 10

[font.normal]
family = "MesloLGS Nerd Font"
style = "Regular"

[font.bold]
family = "MesloLGS Nerd Font"
style = "Bold"

[font.italic]
family = "MesloLGS Nerd Font"
style = "Italic"

# Keep your existing keybindings
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
