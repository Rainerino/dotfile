[colors]
background = #1a1b26
foreground = #c0caf5
primary = #7aa2f7
alert = #f7768e
success = #9ece6a
warning = #e0af68
disabled = #565f89

[bar/main]
width = 100%
height = 30pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 0
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

; Font: MesloLGS NF size 13
font-0 = "MesloLGS NF:size=11;3"

; --- MODULE LAYOUT ---
modules-left = i3
modules-center = date
modules-right =  cpu-multicore cpu-temp cpu-power cpu-fan  gpu-nvidia gpu-temp filesystem memory wlan eth powermode

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
tray-position = right
tray-maxsize = 20

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-background = ${colors.primary}
label-focused-foreground = ${colors.background}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-padding = 1
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/cpu-multicore]
type = internal/cpu
interval = 1
format-prefix = "󰻠"
format-prefix-foreground = ${colors.primary}

; 1. FORCE FIXED LABEL WIDTH
; %percentage:3% ensures it always reserves space for "100", 
; so it won't jump when going from " 9%" to "100%".
# format = <label> <ramp-coreload>
format = <label>
label = %percentage:3%%

; 2. FORCE FIXED RAMP WIDTH
; The trick is to NOT use a space " " for empty.
; Use a visible character (like a dot or underscore) and make it very dark.
; This guarantees every core always takes up exactly 1 character width.

ramp-coreload-spacing = 0
; State 0 (Idle): A dimmed underscore or dot
ramp-coreload-0 = _
ramp-coreload-0-foreground = ${colors.disabled}

; States 1-7 (Load): The rising blocks
ramp-coreload-1 = ▂
ramp-coreload-2 = ▃
ramp-coreload-3 = ▄
ramp-coreload-4 = ▅
ramp-coreload-5 = ▆
ramp-coreload-6 = ▇
ramp-coreload-7 = █

; Colors for the load (Green -> Yellow -> Red)
ramp-coreload-1-foreground = ${colors.success}
ramp-coreload-2-foreground = ${colors.success}
ramp-coreload-3-foreground = ${colors.warning}
ramp-coreload-4-foreground = ${colors.warning}
ramp-coreload-5-foreground = ${colors.alert}
ramp-coreload-6-foreground = ${colors.alert}
ramp-coreload-7-foreground = ${colors.alert}


; Update other modules too if you want to use the Python version for everything:
[module/cpu-temp]
type = custom/script
exec = ~/.config/polybar/scripts/monitor.py cpu-temp
interval = 1
format-prefix = ""
format-prefix-foreground = ${colors.primary}
label = %output%

[module/gpu-nvidia]
type = custom/script
exec = ~/.config/polybar/scripts/monitor.py gpu-util
interval = 2
format-prefix = "󱎴"
format-prefix-foreground = ${colors.primary}
label = %output%

[module/gpu-temp]
type = custom/script
exec = ~/.config/polybar/scripts/monitor.py gpu-temp
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.primary}
label = %output%

[module/cpu-fan]
type = custom/script
exec = ~/.config/polybar/scripts/monitor.py cpu-fan
interval = 2
format-prefix = "󰈐 "
format-prefix-foreground = ${colors.primary}
label = %output%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted = %percentage_used%%

[module/date]
type = internal/date
interval = 1
date = %a, %d %b - %H:%M

# Click-Alt: Weekday, Day Month Year - Hour:Minute:Second
# Example: Friday, 17 February 2026 - 20:42:22
date-alt = %A, %d %B %Y - %H:%M:%S
label = %date%
label-foreground = ${colors.foreground}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %local_ip%

[module/eth]
type = internal/network
interface-type = wired
interval = 3
format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %local_ip%

[module/powermode]
type = custom/script
exec = ~/.config/polybar/scripts/power-profile.sh
interval = 5
format-padding = 1
click-left = ~/.config/polybar/scripts/power-profile.sh --toggle && polybar-msg action "#powermode.exec"

