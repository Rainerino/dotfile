# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
        colors = true
        interval = 5
        color_good = "#F9FAF9"
        color_bad = "#F9FAF9"
        color_degraded = "#DC322F"
}

# order += "cpu_usage"
order += "conky cpu"
order += "conky nvidia"
order += "conky memory"
order += "disk /"
order += "wireless _first_"
order += "ethernet _first_"
# order += "tztime local"
order += "conky date"
conky date {
    format = '[\?color=good {execi 5 "date"}] '
    format += '[\?color=lightskyblue {execi 60 "uptime -p"}] '
}
conky cpu {
    format = '[\?color=good {execi 5 sensors | grep "CPU Package"}] '

    format += '[\?color=cpu.cpu {cpu cpu}% \[{cpubar cpu}\]]'
    
    thresholds = [
        (0, 'darkgray'), (10, 'white'), (50, 'yellow'),
        (75, 'orange'), (100, 'red')
    ]
}
 conky nvidia {
     format = '[\?color=nvidia.temp {nvidia temp}]°C '
     format += '[\?color=lightblue {nvidia mem}/{nvidia memmax} ]'
     format += '[\?color=nvidia.memperc {nvidia memperc}%]'

    thresholds = [
         (0, 'darkgray'), (10, 'white'), (50, 'yellow'),
         (75, 'orange'), (100, 'red')
     ]
    config = {
         'nvidia_display': "':0'"
     }
 }


disk "/" {
	prefix_type = decimal
	format = " ⛁ %percentage_used (U:%used, F:%free) "
}

wireless _first_ {
	# if you use %speed, i3status requires root privileges
        format_up = "ᯤ %ip "
        format_down = ""
}

ethernet _first_ {
	# if you use %speed, i3status requires root privileges
        format_up = " eth: %ip "
        format_down = ""
}

conky memory {
    format = '[\?color=lightskyblue {mem}/{memmax}] '
    format += '[\?color=memperc {memperc}% \[{membar}\]]'
     thresholds = [
         (0, 'darkgray'), (10, 'white'), (50, 'yellow'),
         (75, 'orange'), (100, 'red')
     ]
}


conky {
    config = {
        'console_bar_fill': "'#'",
        'console_bar_unfill': "'_'",
        'default_bar_width': 10,
    }
}


